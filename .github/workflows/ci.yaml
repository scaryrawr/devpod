name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CGO_ENABLED: "0"
  GOFLAGS: -mod=vendor

jobs:
  go:
    name: Go build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build CLI
        run: go build -ldflags "-s -w" -o devpod-cli .

      - name: Test
        run: go test ./pkg/agent ./pkg/devcontainer/sshtunnel
