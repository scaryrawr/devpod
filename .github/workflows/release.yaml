name: Release CLI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or update, for example v0.0.1"
        required: true
        type: string

permissions:
  contents: write

env:
  CGO_ENABLED: "0"
  GOFLAGS: -mod=vendor

jobs:
  prepare:
    name: Resolve release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Resolve release tag
        id: version
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if ! printf '%s' "$tag" | grep -Eq '^v[0-9]+(\.[0-9]+){2}([-+][0-9A-Za-z.-]+)?$'; then
            echo "Release tag must look like v0.0.1, got: $tag" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.asset }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            asset: devpod-linux-amd64
          - runner: ubuntu-latest
            goos: linux
            goarch: arm64
            asset: devpod-linux-arm64
          - runner: ubuntu-latest
            goos: darwin
            goarch: amd64
            asset: devpod-darwin-amd64
          - runner: ubuntu-latest
            goos: darwin
            goarch: arm64
            asset: devpod-darwin-arm64
          - runner: windows-latest
            goos: windows
            goarch: amd64
            asset: devpod-windows-amd64.exe
          - runner: windows-latest
            goos: windows
            goarch: arm64
            asset: devpod-windows-arm64.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build CLI asset
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.tag }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ASSET: ${{ matrix.asset }}
        run: |
          set -euo pipefail

          mkdir -p dist
          go build \
            -ldflags "-s -w -X github.com/loft-sh/devpod/pkg/version.version=${VERSION}" \
            -o "dist/${ASSET}" .

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-asset-${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-asset-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          (cd dist && shasum -a 256 * > checksums.txt)

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "$TAG" \
              --notes "DevPod CLI release $TAG"
          fi

          gh release upload "$TAG" dist/* --repo "$GITHUB_REPOSITORY" --clobber
